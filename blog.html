<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ling's Studio | 博客</title>
  <meta name="description" content="博客文章列表页。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="回到首页">
        <span class="brand-mark">LS</span>
        <span class="brand-text">
          <strong id="blog-site-name">Ling's Studio</strong>
          <span id="blog-site-tagline">翻译、推荐与写作</span>
        </span>
      </a>

      <div class="locale-switcher" aria-label="语言切换">
        <div class="locale-actions">
          <button class="locale-button is-active" type="button" data-locale="zh-Hans">简体</button>
          <button class="locale-button" type="button" data-locale="zh-Hant">繁體</button>
          <button class="locale-button" type="button" data-locale="ja">日本語</button>
        </div>
      </div>

      <nav class="site-nav" aria-label="博客导航">
        <a id="blog-back-home" href="index.html">返回首页</a>
      </nav>
    </header>

    <main>
      <section class="section blog-archive-section">
        <div class="section-heading">
          <p class="eyebrow">Archive</p>
          <h1 class="archive-title" id="archive-title">博客</h1>
          <p id="archive-intro">这里收纳所有博客文章标题。每页最多显示十篇，点击标题即可进入完整文章。</p>
        </div>

        <div class="archive-list" id="archive-list"></div>

        <div class="archive-pagination">
          <button class="pagination-button" id="prev-page" type="button">上一页</button>
          <p class="archive-page-label" id="archive-page-label">第 1 页 / 共 1 页</p>
          <button class="pagination-button" id="next-page" type="button">下一页</button>
        </div>
      </section>
    </main>
  </div>

  <script src="site-data.js"></script>
  <script src="blog.js"></script>
</body>
</html>
